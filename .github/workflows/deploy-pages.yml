name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # GitHub's own Pages template keeps this false so an in-flight publish isn't
  # cancelled mid-deploy (a cancelled deploy-pages can leave Pages half-updated).
  cancel-in-progress: false

jobs:
  # Gate: type-check + eslint + stylelint + prettier --check must pass before we
  # publish. `yarn run check` (NOT `yarn check`, which is Yarn 1's dep verifier).
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn run check
      - run: yarn test:unit

  # Full Playwright E2E against the built site — a second deploy gate so a broken UI
  # can't publish. Mirrors ci.yml's `test` job: build → vite preview (:4173) → suite.
  # (ci.yml runs E2E too, but it's a separate workflow and doesn't block this deploy.)
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn build
        env:
          VITE_MEDIA_BASE_URL: ${{ vars.VITE_MEDIA_BASE_URL }}
          VITE_DEFAULT_MEDIA_BASE_URL: ${{ vars.VITE_DEFAULT_MEDIA_BASE_URL }}
          VITE_RESUME_URL: ${{ vars.VITE_RESUME_URL }}
      # Unit tests again now that dist/ exists, so the "after build" assembler checks run too.
      - run: yarn test:unit
      - run: yarn playwright install --with-deps chromium
      - name: Run E2E against the built site
        run: |
          yarn preview &
          timeout 60 bash -c 'until curl -sf http://localhost:4173 >/dev/null; do sleep 1; done'
          yarn test
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: http://localhost:4173
      # Upload only on failure: upload-artifact@v5 is still a Node 20 action with no Node 24
      # release, so it emits a deprecation annotation whenever it runs. Skipping it on green
      # keeps passing runs warning-free while still capturing the report when E2E breaks.
      - uses: actions/upload-artifact@v5
        if: ${{ failure() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build-and-deploy:
    needs: [check, e2e]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Build the production bundle inside Docker (same toolchain as the local
      # `make` flow), then export dist/ from the container — videos stream from
      # the remote host (repo variable) and base: './' makes it work at /resume/.
      - name: Build Docker image
        run: make static-prod-build
        env:
          VITE_MEDIA_BASE_URL: ${{ vars.VITE_MEDIA_BASE_URL }}
          VITE_DEFAULT_MEDIA_BASE_URL: ${{ vars.VITE_DEFAULT_MEDIA_BASE_URL }}
          VITE_RESUME_URL: ${{ vars.VITE_RESUME_URL }}

      - name: Extract dist/ from Docker
        run: |
          docker create --name temp-container resume-static
          docker cp temp-container:/app/dist ./static-out
          docker rm temp-container

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./static-out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
