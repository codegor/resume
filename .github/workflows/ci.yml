name: CI

# Lint + E2E on every PR and on merges to main. Free for public repos
# (GitHub-hosted runners are unmetered for public repositories).
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: corepack enable
      - run: yarn install --frozen-lockfile
      # type-check + eslint + stylelint + prettier --check (see package.json "check").
      # `yarn run check` — NOT `yarn check`, which is Yarn 1's built-in dep verifier.
      - run: yarn run check

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: corepack enable
      - run: yarn install --frozen-lockfile
      # Vitest unit tests (assembler / site-data adapter / filter logic). The "after build"
      # dist deep-equal checks auto-skip without a dist/ — they run in the `test` job below.
      - run: yarn test:unit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn build
        env:
          VITE_MEDIA_BASE_URL: ${{ vars.VITE_MEDIA_BASE_URL }}
          VITE_DEFAULT_MEDIA_BASE_URL: ${{ vars.VITE_DEFAULT_MEDIA_BASE_URL }}
          VITE_RESUME_URL: ${{ vars.VITE_RESUME_URL }}
      # Unit tests again now that dist/ exists, so the "after build" assembler checks run too.
      - run: yarn test:unit
      - run: yarn playwright install --with-deps chromium
      # Serve the built dist/ (vite preview, port 4173) and run the Playwright
      # suite against it — the config has no webServer, it tests a served site.
      - name: Run E2E against the built site
        run: |
          yarn preview &
          timeout 60 bash -c 'until curl -sf http://localhost:4173 >/dev/null; do sleep 1; done'
          yarn test
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: http://localhost:4173
      # Upload only on failure: upload-artifact@v5 is still a Node 20 action with no Node 24
      # release, so it emits a deprecation annotation whenever it runs. Skipping it on green
      # keeps passing runs warning-free while still capturing the report when E2E breaks.
      - uses: actions/upload-artifact@v5
        if: ${{ failure() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
