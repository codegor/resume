# Standalone nginx vhost for the built résumé (Docker image / portability path).
# Serves the Vite build output. Mirrors the dev_env resume.dev.conf.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    gzip_static on;

    # Security headers (`always` so they're sent on errors too). CSP is sized to
    # the app: 'unsafe-inline' for the inline boot-error guard script in index.html
    # + Vue-injected <style>; data: for inlined/offline images & fonts; media https:
    # because videos stream from VITE_MEDIA_BASE_URL. NB: nginx replaces inherited
    # add_header when a nested location sets its own — so the asset block repeats nosniff.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; media-src 'self' https:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'" always;

    # Real files (hashed JS/CSS, config.json, assets/*) first; else the entry page.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the content-hashed build assets.
    location ~* \.(js|css|woff2|png|jpe?g|svg|mp4)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Never serve project meta/work files or env secrets.
    location ~ /\.(git|claude|vscode|history) {
        deny all;
    }
    location ~ /\.env {
        deny all;
    }
}
