<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      /* Boot-error guard + pre-bundle language: if a script fails to load or the app
         never marks itself ready within 9s, show a friendly fallback instead of a blank
         page. The boot strings are duplicated here per language because the app bundle
         (and its locale JSON) hasn't loaded yet. en uses the literal fallbacks; add a
         language to BOOT_MSGS ONLY when you also ship its locale (src/ui/locales/). */
      ;(function () {
        var lang = 'en'
        try {
          lang =
            new URLSearchParams(location.search).get('lang') ||
            localStorage.getItem('resume-lang') ||
            'en'
        } catch (e) {}
        var BOOT_MSGS = {
          /* uk: { msg: '…', telegram: '✈ …', loading: '…' } */
        }
        var M = BOOT_MSGS[lang]
        if (M) document.documentElement.lang = lang
        else M = {}
        var T = {
          msg:
            M.msg ||
            "Sorry — this résumé couldn't load right now. Please reach out and I'll fix it.",
          telegram: M.telegram || '✈ Message me on Telegram',
          loading: M.loading || 'Loading résumé…',
        }
        if (M.loading) {
          document.addEventListener('DOMContentLoaded', function () {
            var l = document.querySelector('#app .loading')
            if (l) l.textContent = T.loading
          })
        }
        function show() {
          if (document.getElementById('__boot_err')) return
          function build() {
            var d = document.createElement('div')
            d.id = '__boot_err'
            d.className = 'boot-error-screen'
            d.innerHTML =
              '<div class="be-brand">Egor Berezovsky<span class="dot">.</span></div>' +
              '<p class="be-msg"></p>' +
              '<a class="be-btn" href="https://t.me/esbukraine" target="_blank" rel="noopener"></a>'
            d.querySelector('.be-msg').textContent = T.msg
            d.querySelector('.be-btn').textContent = T.telegram
            document.body.appendChild(d)
            var app = document.getElementById('app')
            if (app) app.style.display = 'none'
          }
          if (document.body) build()
          else document.addEventListener('DOMContentLoaded', build)
        }
        window.__bootError = show
        window.addEventListener(
          'error',
          function (e) {
            var t = e.target || {}
            if (t.tagName === 'SCRIPT') show()
          },
          true,
        )
        window.addEventListener('load', function () {
          setTimeout(function () {
            if (!window.__appReady) show()
          }, 9000)
        })
      })()
    </script>
    <style>
      .boot-error-screen {
        position: fixed;
        inset: 0;
        z-index: 100000;
        background: #f1e9dc;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        text-align: center;
        padding: 32px;
        box-sizing: border-box;
      }
      .boot-error-screen .be-brand {
        font-family: 'Newsreader', Georgia, serif;
        font-weight: 600;
        font-size: clamp(32px, 7vw, 52px);
        color: #211c16;
        letter-spacing: -0.01em;
        line-height: 1.08;
      }
      .boot-error-screen .be-brand .dot {
        color: #cf5320;
      }
      .boot-error-screen .be-msg {
        font-family: 'Archivo', system-ui, sans-serif;
        font-weight: 500;
        font-size: clamp(18px, 4.6vw, 27px);
        color: #5c5448;
        max-width: 22ch;
        line-height: 1.45;
        margin: 0;
      }
      .boot-error-screen .be-btn {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        font-family: 'Archivo', system-ui, sans-serif;
        font-size: clamp(15px, 3.8vw, 18px);
        font-weight: 600;
        padding: 14px 26px;
        border-radius: 34px;
        background: #cf5320;
        color: #fdf6ec;
        text-decoration: none;
        margin-top: 6px;
      }
      .boot-error-screen .be-btn:hover {
        filter: brightness(1.06);
      }
    </style>
    <title>Egor Berezovsky — Résumé</title>
    <meta
      name="description"
      content="Egor Berezovsky — 16+ years building scalable web applications. Team Lead · Architect · Backend · Frontend · AI."
    />
    <meta name="robots" content="noindex, nofollow" />
    <!-- Google tag (gtag.js) — only on the live GitHub Pages host, so the offline
         single-file build and local resume.local testing never report visits. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23cf5320'/%3E%3Ctext x='50' y='66' font-family='Georgia, serif' font-size='52' fill='%23fdf6ec' text-anchor='middle' font-style='italic'%3EEB%3C/text%3E%3C/svg%3E"
    />
  </head>
  <body>
    <div id="app"><div class="loading">Loading résumé…</div></div>

    <noscript>
      <style>
        #app {
          display: none !important;
        }
        body {
          margin: 0;
        }
        .noscript-screen {
          position: fixed;
          inset: 0;
          z-index: 100000;
          background: #f1e9dc;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 22px;
          text-align: center;
          padding: 32px;
          box-sizing: border-box;
        }
        .noscript-screen .ns-brand {
          font-family: 'Newsreader', Georgia, serif;
          font-weight: 600;
          font-size: clamp(34px, 8vw, 60px);
          color: #211c16;
          letter-spacing: -0.01em;
          line-height: 1.05;
        }
        .noscript-screen .ns-brand .dot {
          color: #cf5320;
        }
        .noscript-screen .ns-msg {
          font-family: 'Archivo', system-ui, sans-serif;
          font-weight: 500;
          font-size: clamp(20px, 5vw, 30px);
          color: #5c5448;
          max-width: 18ch;
          line-height: 1.4;
          margin: 0;
        }
      </style>
      <div class="noscript-screen">
        <div class="ns-brand">Egor Berezovsky<span class="dot">.</span></div>
        <p class="ns-msg">Please enable JavaScript to view this résumé.</p>
      </div>
    </noscript>

    <!-- public/ is the Vite root; the TS/Vue source lives one level up in src/ui/ -->
    <script type="module" src="../src/ui/main.ts"></script>
  </body>
</html>
